services:
  postgres:
    image: postgres:16-alpine
    container_name: mdr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
      POSTGRES_DB: maintenance_debt_radar
    ports:
      - "5432:5432"
    volumes:
      - mdr_pgdata:/var/lib/postgresql/data

volumes:
  mdr_pgdata:
